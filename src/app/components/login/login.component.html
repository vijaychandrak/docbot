<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Sign in to your DocBot account</p>
        </div>

        <form (ngSubmit)="login()" class="auth-form">
            <div class="form-group">
                <label for="username">Username or Email</label>
                <input type="text" id="username" [(ngModel)]="username" name="username"
                    placeholder="Enter username or email" [disabled]="isLoading" autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="Enter password"
                    [disabled]="isLoading" autocomplete="current-password">
            </div>

            <div class="error-message" *ngIf="errorMessage">
                {{ errorMessage }}
            </div>

            <button type="submit" class="btn-submit" [disabled]="isLoading">
                {{ isLoading ? 'Signing in...' : 'Sign In' }}
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a routerLink="/register">Register</a></p>
        </div>
    </div>
</div>
